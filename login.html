<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Omnitrix</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: var(--bg-color);">
  
  <div class="container" style="width: 100%;">
    <div class="form-container card animate-fade-up">
      <h2 style="text-align: center; margin-bottom: 2rem;">Sign in to Omnitrix</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Login</button>
      </form>
      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; margin-bottom: 0;">
        <a href="index.html" style="color: var(--text-muted); text-decoration: none;">&larr; Back to Home</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
