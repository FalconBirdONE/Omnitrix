<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Omnitrix Control Panel</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="min-height: 100vh; background-color: var(--bg-color);">
  
  <div class="container animate-fade-up">
    <header class="dashboard-header">
      <h2>Omnitrix Control Panel</h2>
      <a href="index.html" class="logo" style="font-size: 1.2rem;">Logout</a>
    </header>

    <div class="dashboard-grid">
      <!-- Distro Selection Form -->
      <aside class="dashboard-sidebar">
        <div class="card">
          <h3 style="margin-bottom: 1.5rem; color: var(--text-color);">Environment Config</h3>
          <form id="distroForm">
            <div class="form-group">
              <label for="distroSelect">Select Distribution</label>
              <select id="distroSelect" class="form-select" required>
                <option value="" disabled selected>Select an option...</option>
                <option value="arch">Arch Linux</option>
                <option value="fedora">Fedora</option>
                <option value="ubuntu">Ubuntu</option>
                <option value="mint">Linux Mint</option>
                <option value="popos">Pop!_OS</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="useCase">Primary Use Case</label>
              <select id="useCase" class="form-select">
                <option value="Development">Development</option>
                <option value="Daily Driving">Daily Driving</option>
                <option value="Testing / QA">Testing / QA</option>
              </select>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
              <label for="experience">Experience Level</label>
              <select id="experience" class="form-select">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
              </select>
            </div>

            <button type="submit" class="btn" style="width: 100%;">Switch Environment</button>
          </form>
        </div>
      </aside>

      <!-- Simulated Switch Target -->
      <main>
        <div id="dashboardScreen" class="dashboard-panel animate-fade-up delay-1">
          <div class="dashboard-screen-content">
            <h2 id="dashboardHeading">System Ready</h2>
            <p id="dashboardDesc">Select an environment to begin.</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
